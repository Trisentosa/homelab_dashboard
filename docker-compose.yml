services:
  dashboard:
    build:
      context: .
    security_opt:
      - apparmor:unconfined
    image: homelab-dashboard:latest
    container_name: homelab-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config
    environment:
      - DASHBOARD_PASSWORD=admin
      - SESSION_SECRET=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      - CONFIG_PATH=/config/services.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
